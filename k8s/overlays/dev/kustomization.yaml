apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: books-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

configMapGenerator:
  - name: books-api-config
    behavior: merge
    literals:
      - MYSQL_DB=testdb_dev

labels:
  - pairs:
      environment: dev
