apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-api
  namespace: books-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: books-api         
  template:
    metadata:
      labels:
        app: books-api          
    spec:
      containers:
        - name: books-api
          image: arhurrr/devops-api:v1.1  
          imagePullPolicy: Always 
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: books-api-config
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
               
