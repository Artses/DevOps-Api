version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: your_secure_password
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql   
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pyour_secure_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s            

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: mysql         
      MYSQL_USER: root
      MYSQL_PASSWORD: your_secure_password
      MYSQL_DB: testdb
    depends_on:
      mysql:
        condition: service_healthy 

volumes:
  mysql_data: