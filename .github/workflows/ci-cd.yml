name: CI/CD — Books API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: arhurrr/devops-api   
  IMAGE_TAG: ${{ github.sha }}                     

jobs:

  # ── Job 1: Lint and test ───────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Lint
        run: flake8 . --max-line-length=100 --exclude=__pycache__,.git

  # ── Job 2: Build and push Docker image ────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' 
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha       
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to dev ───────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    needs: build
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > kubeconfig.yaml

      - name: Deploy
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl kustomize k8s/overlays/dev | \
            sed "s|your-dockerhub-username/books-api:1.0.0|${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" | \
            kubectl apply -f -

      - name: Verify rollout
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl rollout status deployment/books-api -n books-api --timeout=120s

  # ── Job 4: Deploy to prod (requires manual approval) ──────────────────────
  deploy-prod:
    name: Deploy → Prod
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production             
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig.yaml

      - name: Deploy
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl kustomize k8s/overlays/prod | \
            sed "s|your-dockerhub-username/books-api:1.0.0|${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" | \
            kubectl apply -f -

      - name: Verify rollout
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl rollout status deployment/books-api -n books-api --timeout=180s
